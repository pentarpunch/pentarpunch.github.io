<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dotonaro's page</title>
  <style>
    /* Hide unwanted repo/nickname header */
    h1.repo-title {
      display: none;
    }

    /* Page styling */
    body {
      background-color: #0d0d0d;   /* dark background */
      color: #f0f0f0;              /* light text */
      font-family: 'Arial', sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    /* Responsive text */
    .intro {
      font-size: 5vw;              /* scales with screen width */
      text-shadow: 0 0 10px #ff0066;
    }

    @media (max-width: 600px) {
      .intro {
        font-size: 7vw;            /* slightly larger on phones */
      }
    }
  </style>
</head>
<body>
  <!-- Hidden by CSS -->
  <h1 class="repo-title">username.github.io</h1>

  <!-- Your visible content -->
  <div class="intro">Welcome to my GitHub.io profile!</div>
  <p>Here you can learn more about me, my projects, and my cosmic memes.</p>
</body>
</html>
